<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATU Pathfinder - QR Code Generator Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #002147;
            --bg-light: #f8fafc;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        header {
            background-color: var(--primary);
            color: #ffffff;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        .container {
            width: 95%;
            max-width: 550px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: var(--card-shadow);
            box-sizing: border-box;
            text-align: center;
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            background-color: #f1f5f9;
            border: 2px solid #e2e8f0;
            padding: 8px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #475569;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .btn-back:hover {
            background-color: #e2e8f0;
        }
        .qr-inputs {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }
        .qr-input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
        }
        .qr-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        .qr-btn:hover {
            opacity: 0.9;
        }
        .download-btn {
            background-color: #28A745;
            color: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            margin-top: 15px;
            display: none; /* Hidden until QR is generated */
            width: 100%;
        }
        .download-btn:hover {
            opacity: 0.9;
        }
        #qrcode-container {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }
        #qrcode {
            padding: 15px;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            display: inline-block;
        }
        footer {
            margin-top: auto;
            margin-bottom: 25px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <header>ATU PATHFINDER - QR PORTAL</header>

    <div class="container">
        <a href="index.html" class="btn-back">⬅️ Back to Master Map</a>

        <h3 style="margin: 0; color: var(--primary); font-size: 1.3rem;">OFFLINE-READY QR GENERATOR</h3>
        <p style="font-size: 0.85rem; color: #64748b; margin-top: 5px;">
            Generate and download high-correction QR signs for physical campus installation.
        </p>
        
        <div class="qr-inputs">
            <input type="url" id="qr-text" 
                   class="qr-input-field"
                   placeholder="Paste landmark URL here...">
            
            <button onclick="generateLiveQR()" class="qr-btn">
                Generate QR Code
            </button>
            
            <div id="qrcode-container">
                <div id="qrcode"></div>
            </div>

            <button id="download-btn" onclick="downloadQRCode()" class="download-btn">
                💾 Download High-Res QR (PNG)
            </button>
        </div>
    </div>

    <footer>ATU Pathfinder System • Group 25</footer>

    <script>
        // Set default value as the base URL of the deployment
        const baseDir = window.location.href.substring(0, window.location.href.lastIndexOf('/') + 1);
        document.getElementById('qr-text').value = baseDir + "index.html";

        function generateLiveQR() {
            const qrContainer = document.getElementById("qrcode");
            const textValue = document.getElementById("qr-text").value.trim();
            const downloadBtn = document.getElementById("download-btn");
            
            qrContainer.innerHTML = ""; // Clear old code
            
            if (!textValue) {
                alert("Please enter a valid URL.");
                downloadBtn.style.display = "none";
                return;
            }

            // Create new QR Code using canvas engine
            new QRCode(qrContainer, {
                text: textValue,
                width: 256,
                height: 256,
                colorDark: "#002147",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H // High error correction
            });

            // Show download button once generated
            setTimeout(() => {
                downloadBtn.style.display = "block";
            }, 100);
        }

        // Handle Downloading of the Canvas/Image Code safely
        function downloadQRCode() {
            const qrDiv = document.getElementById("qrcode");
            
            // Try to find the image generated or the fallback canvas
            const img = qrDiv.querySelector("img");
            const canvas = qrDiv.querySelector("canvas");
            
            let downloadUrl = "";
            
            if (img && img.src) {
                downloadUrl = img.src;
            } else if (canvas) {
                downloadUrl = canvas.toDataURL("image/png");
            } else {
                alert("Could not extract image source for download.");
                return;
            }

            const downloadLink = document.createElement("a");
            downloadLink.href = downloadUrl;
            downloadLink.download = "atu-pathfinder-qr.png"; // Default download filename
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
        }

        // Generate initial default on load
        window.addEventListener('load', generateLiveQR);

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker Registered!', reg.scope))
                    .catch((err) => console.error('Registration failed:', err));
            });
        }
    </script>
</body>
</html>
